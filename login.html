<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPulse - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
</head>
<body data-theme="dark">
  <div class="login-wrapper">
    <!-- Decorative background elements -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="login-card glass-panel">
      <div class="login-header">
        <div class="login-logo">
          <svg viewBox="0 0 24 24" fill="none">
             <path d="M12 3L1 9L12 15L21 10.09V17H23V9L12 3Z" fill="currentColor"/>
             <path d="M5 13.18V17.18C5 17.18 8.5 21 12 21C15.5 21 19 17.18 19 17.18V13.18L12 17L5 13.18Z" fill="currentColor"/>
          </svg>
        </div>
        <h2>Welcome Back</h2>
        <p>Sign in to continue to EduPulse</p>
      </div>
      
      <form id="loginForm" class="login-form" novalidate>
        <div id="loginErr" class="err" style="text-align: center; font-size: 14px; margin-bottom: -10px;"></div>
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-with-icon">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input type="text" id="username" placeholder="e.g. admin" required>
          </div>
          <span class="err" id="userErr"></span>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-with-icon">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="button" id="togglePassword" class="btn-icon" aria-label="Toggle password visibility">
              <!-- Show eye icon initially -->
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
          <span class="err" id="passErr"></span>
        </div>
        
        <button type="submit" class="btn-submit login-btn">
          Sign In
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
